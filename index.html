<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw HLS Streaming Test</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; background: #000; margin-top: 20px; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; border-radius: 4px; border: 1px solid #444; }
        input { background: #222; color: #fff; }
        button { background: #0070f3; color: #fff; cursor: pointer; border: none; font-weight: bold; }
        #status { margin: 15px 0; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Direct Movie Stream Tester</h1>
    <p>Enter a TMDb Movie ID below to fetch its direct .m3u8 link:</p>
    
    <input type="text" id="tmdbId" value="550">
    <button onclick="loadStream()">Fetch & Play Stream</button>

    <div id="status"></div>
    <video id="videoPlayer" controls></video>

    <script>
    async function loadStream() {
        const id = document.getElementById('tmdbId').value;
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('videoPlayer');
        
        statusDiv.style.color = "#fff";
        statusDiv.innerText = "Attempting stream collection...";

        try {
            // UPDATED: Directly targeting the stream source link without intermediate proxy configs
            const m3u8Url = `https://vidlink.pro{id}`;

            statusDiv.style.color = "#00ff00";
            statusDiv.innerHTML = `🎉 Initializing Player Engine for ID: ${id}`;

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(m3u8Url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = m3u8Url;
                video.addEventListener('loadedmetadata', () => video.play());
            }

        } catch (error) {
            console.error(error);
            statusDiv.style.color = "#ff3333";
            statusDiv.innerText = "❌ Playback Initialization Failed.";
        }
    }
    </script>
</body>
</html>
