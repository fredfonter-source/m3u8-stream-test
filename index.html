<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefox HLS Streaming Tester</title>
    
    <!-- 1. Include the Video.js Player Styling Sheet -->
    <link href="https://zencdn.net" rel="stylesheet" />
    
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .video-wrapper { width: 100%; max-width: 800px; margin: 20px auto; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #0070f3; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0051a8; }
        #status { margin: 15px 0; font-size: 16px; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>

    <h1>Firefox HLS Streaming Tester</h1>
    <p>Using a cross-platform engine to decode .m3u8 streams on Firefox:</p>
    
    <button onclick="startHlsPlayback()">Run HLS Video Engine</button>

    <div id="status"></div>

    <div class="video-wrapper">
        <!-- 2. Set up the Video.js HTML Element Container -->
        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="800" height="450">
            <p class="vjs-no-js">To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video</p>
        </video>
    </div>

    <!-- 3. Load the Video.js Core Script (This automatically handles the .m3u8 decoding layout) -->
    <script src="https://zencdn.net"></script>

    <script>
    function startHlsPlayback() {
        const statusDiv = document.getElementById('status');
        const streamUrl = 'https://mux.dev';
        
        statusDiv.innerText = "🎉 Stream engine initialized! Buffering media segments...";

        // 4. Initialize the media player structure over the standard element
        var player = videojs('my-video');
        
        // 5. Inject the .m3u8 stream configuration mapping explicitly
        player.src({
            src: streamUrl,
            type: 'application/x-mpegURL' // Correct MIME type mapping that forces Firefox to decode HLS
        });

        player.play().catch(function(error) {
            console.log("Awaiting user click action to bypass autoplay blocks.");
        });
    }
    </script>
</body>
</html>
