<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Local Player Tester</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .video-wrapper { width: 100%; max-width: 800px; margin: 20px auto; }
        video { width: 100%; background: #000; border-radius: 8px; border: 1px solid #333; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #0070f3; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0051a8; }
        #status { margin: 15px 0; font-size: 16px; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>

    <h1>Unblocked Local Video Tester</h1>
    <p>Using a zero-dependency HTML5 layout to completely bypass local network domain blocks:</p>
    
    <button onclick="startPlayback()">Launch Video Player</button>

    <div id="status"></div>

    <div class="video-wrapper">
        <!-- Native player tag that requires zero external JavaScript packages to run -->
        <video id="my-video" controls width="800" height="450"></video>
    </div>

    <script>
    function startPlayback() {
        const statusDiv = document.getElementById('status');
        const videoElement = document.getElementById('my-video');
        
        // Using a highly stable, open-source static MP4 file path hosted on Google's public cloud network
        const safeMp4Url = 'https://googleapis.com';
        
        statusDiv.innerText = "🎉 Video loaded natively! Click the play icon below.";

        // Injecting the source directly into the browser's core rendering engine
        videoElement.src = safeMp4Url;
        videoElement.load();
        videoElement.play().catch(function(error) {
            console.log("Autoplay paused. Awaiting manual user play interaction click.");
        });
    }
    </script>
</body>
</html>
