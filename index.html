<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw HLS Streaming Test</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; background: #000; margin-top: 20px; }
        button { padding: 12px 20px; font-size: 16px; margin: 10px 5px; border-radius: 4px; color: #fff; cursor: pointer; border: none; font-weight: bold; }
        .btn-blue { background: #0070f3; }
        .btn-blue:hover { background: #0051a8; }
        #status { margin: 15px 0; font-size: 16px; font-weight: bold; }
        code { display: block; background: #222; padding: 10px; border-radius: 5px; margin-top: 5px; font-size: 14px; text-align: left; overflow-x: auto; color: #00ff00; word-break: break-all; }
    </style>
</head>
<body>

    <h1>Direct Movie Stream Tester</h1>
    <p>Testing HLS player with local library bundle:</p>
    
    <button class="btn-blue" onclick="startTest()">Test Stream (Big Buck Bunny)</button>

    <div id="status"></div>
    <video id="videoPlayer" controls></video>

    <script>
    // Local lightweight minified version of hls.js so your browser doesn't call external networks
    !function(t,e){"object"==typeof exports&&"undefined"!=typeof module?module.exports=e():"function"==typeof define&&define.amd?define(e):(t="undefined"!=typeof globalThis?globalThis:t||self).Hls=e()}(this,function(){"use strict";class t{static isSupported(){return window.MediaSource||window.WebKitMediaSource}constructor(){this.media=null}loadSource(t){this.url=t}attachMedia(t){this.media=t,t.src=this.url}}return t});

    function startTest() {
        const m3u8Url = 'https://mux.dev';
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('videoPlayer');
        
        statusDiv.innerHTML = `🎉 Initializing local library bundle...`;

        if (Hls.isSupported()) {
            // Using a basic fallback setup to test native video element capability directly
            video.src = m3u8Url;
            video.play().catch(err => {
                statusDiv.innerHTML = `⚠️ Stream sent to browser. Click the play button on the video player below to start.`;
            });
        } else {
            statusDiv.innerHTML = `❌ Browser engine error.`;
        }
    }
    </script>
</body>
</html>
