<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw HLS Streaming Test</title>
    <!-- Include the full, corrected path to the hls.js library script -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; background: #000; margin-top: 20px; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; border-radius: 4px; border: 1px solid #444; }
        input { background: #222; color: #fff; }
        button { background: #0070f3; color: #fff; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #0051a8; }
        #status { margin: 15px 0; font-size: 16px; font-weight: bold; }
        code { display: block; background: #222; padding: 10px; border-radius: 5px; margin-top: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Direct Movie Stream Tester</h1>
    <p>Enter a TMDb Movie ID below to fetch its direct .m3u8 link:</p>
    
    <!-- Defaulting to 550 (Fight Club) for reliable initial testing -->
    <input type="text" id="tmdbId" value="550" placeholder="e.g. 550 for Fight Club">
    <button onclick="loadStream()">Fetch & Play Stream</button>

    <div id="status"></div>
    <video id="videoPlayer" controls></video>

    <script>
    async function loadStream() {
        const id = document.getElementById('tmdbId').value;
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('videoPlayer');
        
        statusDiv.style.color = "#fff";
        statusDiv.innerText = "Bypassing API restrictions...";

        try {
            // Setup a public reverse proxy to prevent client-side browser CORS blocking errors
            const proxyUrl = "https://herokuapp.com";
            const targetApi = `https://vidlink.pro{id}`;
            
            const response = await fetch(proxyUrl + targetApi, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });
            
            if (!response.ok) throw new Error("Proxy error");

            const data = await response.json();

            // Extract the deep-nested playlist path from the API response payload
            const m3u8Url = data.stream?.playlist || data.hls || (data.stream && data.stream.hls);

            if (!m3u8Url) {
                statusDiv.style.color = "#ff3333";
                statusDiv.innerText = "❌ No active .m3u8 source found for this ID.";
                return;
            }

            statusDiv.style.color = "#00ff00";
            statusDiv.innerHTML = `🎉 Success! Found stream: <br><code style="word-break: break-all;">${m3u8Url}</code>`;

            // Clear any old video sources
            video.src = "";

            // Load and execute the live stream into the browser playback component
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(m3u8Url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native fallback engine execution block for Apple Safari web browsers
                video.src = m3u8Url;
                video.addEventListener('loadedmetadata', () => video.play());
            }

        } catch (error) {
            console.error(error);
            statusDiv.style.color = "#ff3333";
            statusDiv.innerHTML = `❌ Proxy Connection Blocked.<br><small style="color: #bbb;">You need to activate the server proxy first: <br>1. Open <a href="https://herokuapp.comcorsdemo" target="_blank" style="color:#00ffff; font-weight:bold;">Cors Demo Server</a> in a new tab.<br>2. Click "Request temporary access".<br>3. Return here and click Fetch again.</small>`;
        }
    }
    </script>
</body>
</html>
