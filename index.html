<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw HLS Streaming Test</title>
    <!-- Ultra-stable cloudflare cdnjs network for the hls player library -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; background: #000; margin-top: 20px; }
        button { padding: 12px 20px; font-size: 16px; margin: 10px 5px; border-radius: 4px; color: #fff; cursor: pointer; border: none; font-weight: bold; }
        .btn-blue { background: #0070f3; }
        .btn-blue:hover { background: #0051a8; }
        .btn-green { background: #00cc66; }
        .btn-green:hover { background: #00994c; }
        #status { margin: 15px 0; font-size: 16px; font-weight: bold; }
        code { display: block; background: #222; padding: 10px; border-radius: 5px; margin-top: 5px; font-size: 14px; text-align: left; overflow-x: auto; color: #00ff00; word-break: break-all; }
    </style>
</head>
<body>

    <h1>Direct Movie Stream Tester</h1>
    <p>Select a stable sample stream below to test your player's HLS decoding capabilities:</p>
    
    <!-- Using open-source test stream options to completely verify your engine architecture -->
    <button class="btn-blue" onclick="loadStream('https://mux.dev', 'Sample 1 (Big Buck Bunny)')">Test Stream 1</button>
    <button class="btn-green" onclick="loadStream('https://longtailvideo.com', 'Sample 2 (BipBop Test)')">Test Stream 2</button>

    <div id="status"></div>
    <video id="videoPlayer" controls></video>

    <script>
    function loadStream(m3u8Url, streamName) {
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('videoPlayer');
        
        statusDiv.innerHTML = `🎉 Successfully loaded ${streamName}: <code>${m3u8Url}</code>`;

        // Reset any existing video sources to prevent memory leaks
        video.pause();
        video.src = "";
        video.load();

        // Feed the verified .m3u8 video path cleanly over to the hls.js decoder engine
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(m3u8Url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(err => console.log("Autoplay blocked by browser policy, waiting for user click."));
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari fallback support block
            video.src = m3u8Url;
            video.addEventListener('loadedmetadata', () => video.play());
        } else {
            statusDiv.style.color = "#ff3333";
            statusDiv.innerText = "❌ HLS Streaming is not supported on this browser architecture.";
        }
    }
    </script>
</body>
</html>
